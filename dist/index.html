<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d6efd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QRTools" />
  <link rel="manifest" href="/qrtools/manifest.json" />
  <link rel="apple-touch-icon" href="/qrtools/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/qrtools/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/qrtools/icons/icon-512.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <title>QRTools</title>
  <script type="module" crossorigin src="/qrtools/assets/index-BGIXPRN-.js"></script>
  <link rel="stylesheet" crossorigin href="/qrtools/assets/index-CnP2FTzR.css">
</head>
<body>
  <div id="app" class="container py-3" style="max-width: 600px;">
    <header class="text-center mb-4">
      <h1 class="h3 mb-1">QRTools</h1>
      <p class="text-body-secondary small mb-0">Генерация и сканирование QR-кодов</p>
    </header>

    <ul class="nav nav-pills nav-fill mb-3" id="tabs">
      <li class="nav-item">
        <button class="nav-link active" data-tab="generate">Генерация</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-tab="scan">Сканирование</button>
      </li>
    </ul>

    <!-- Генерация -->
    <div id="tab-generate" class="tab-pane fade show active">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Создать QR-код</h5>
          <div class="mb-3">
            <label for="plain-text" class="form-label">Данные</label>
            <textarea id="plain-text" class="form-control" rows="4" placeholder="Введите текст, ссылку или данные..."></textarea>
          </div>
          <div class="mb-3">
            <label for="qr-size" class="form-label">Размер (px)</label>
            <input type="number" id="qr-size" class="form-control" value="400" min="100" max="2000" step="50" style="width: 140px;" />
          </div>
          <button id="btn-generate" class="btn btn-primary w-100">Сгенерировать QR-код</button>
          <div id="qr-result" class="mt-3 text-center d-none">
            <img id="qr-image" class="img-fluid rounded border mb-2" alt="QR Code" style="max-width: 300px;" />
            <div class="d-flex gap-2 justify-content-center">
              <button id="btn-save-qr" class="btn btn-outline-secondary btn-sm">Сохранить PNG</button>
              <button id="btn-copy-qr" class="btn btn-outline-secondary btn-sm">Копировать текст</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Сканирование -->
    <div id="tab-scan" class="tab-pane fade">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Сканировать QR/Штрихкод</h5>
          <div class="d-flex gap-2 mb-3">
            <button id="btn-open-image" class="btn btn-outline-primary flex-fill">Открыть изображение</button>
            <button id="btn-paste-image" class="btn btn-outline-primary flex-fill">Из буфера</button>
          </div>
          <button id="btn-select-region" class="btn btn-outline-warning w-100 d-none mb-3">Выделить область</button>
          <div id="scan-preview" class="d-none mb-3">
            <div id="scan-image-wrapper" class="position-relative d-inline-block w-100">
              <img id="scan-image" class="img-fluid rounded border" alt="Scanned" />
              <div id="region-overlay" class="d-none"></div>
            </div>
          </div>
          <div id="scan-results" class="d-none">
            <h6>Найденные коды:</h6>
            <div id="scan-codes-list" class="list-group mb-3"></div>
            <div id="scan-status" class="alert d-none"></div>
          </div>
          <div id="decrypted-result" class="d-none">
            <h6>Данные:</h6>
            <textarea id="decrypted-text" class="form-control mb-2" readonly rows="4"></textarea>
            <button id="btn-copy-decrypted" class="btn btn-outline-secondary btn-sm">Копировать</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center mt-3">
      <small id="status-bar" class="text-body-secondary">Готов</small>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
